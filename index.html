<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View PDF Document</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f5f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:white;
border:1px solid #d9dde3;
border-radius:10px;
overflow:hidden;
}

.logo{
text-align:center;
padding:25px 20px 15px;
border-bottom:1px solid #e5e5e5;
}

.logo h1{
color:#0c4b87;
font-size:38px;
font-weight:bold;
}

.logo p{
color:#777;
margin-top:5px;
}

.content{
padding:35px 25px;
text-align:center;
}

.content h2{
color:#0c4b87;
font-size:36px;
margin-bottom:18px;
}

.content p{
color:#666;
font-size:19px;
line-height:1.6;
margin-bottom:30px;
}

.button{
display:block;
width:100%;
text-decoration:none;
background:#063b73;
color:white;
padding:18px;
border-radius:8px;
font-size:22px;
font-weight:bold;
margin-bottom:18px;
transition:.2s;
}

.button:hover{
background:#0a4f97;
}

.footer{
text-align:center;
color:#999;
font-size:13px;
padding:20px;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">
<h1>YOUR LOGO</h1>
<p>Replace this with your logo or organization name</p>
</div>

<div class="content">

<h2>View PDF Document</h2>

<p>
To view this PDF document on your mobile device,
please use one of the options below:
</p>

<a class="button" href="document.pdf" target="_blank">
📄 Open in Browser
</a>

<a class="button" href="document.pdf" download="document.pdf">
⬇ Download PDF
</a>

</div>

<div class="footer">
Secure PDF Document
</div>

</div>

</body>
</html>
